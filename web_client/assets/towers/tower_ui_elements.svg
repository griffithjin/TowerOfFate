<!-- tower_ui_elements.svg - 名塔卡通UI元素 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2"/>
      <stop offset="100%" style="stop-color:#87ceeb"/>
    </linearGradient>
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="50%" style="stop-color:#a0826d"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#skyGradient)"/>
  
  <!-- ==================== 埃菲尔铁塔 ==================== -->
  <g id="eiffel-tower" transform="translate(100, 100)">
    <!-- 塔身 -->
    <path d="M100 600 L120 500 L130 400 L135 300 L138 200 L140 100 L142 50 L140 20 L150 0 L160 20 L158 50 L160 100 L162 200 L165 300 L170 400 L180 500 L200 600 Z" 
          fill="url(#towerGradient)" stroke="#5d4e37" stroke-width="2"/>
    
    <!-- 13层标记 -->
    <g class="tower-levels">
      <!-- 2层 -->
      <rect x="50" y="550" width="200" height="30" fill="rgba(255,107,107,0.3)" rx="5"/>
      <text x="150" y="570" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2层</text>
      <!-- 3层 -->
      <rect x="60" y="500" width="180" height="30" fill="rgba(255,142,83,0.3)" rx="5"/>
      <text x="150" y="520" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3层</text>
      <!-- 4层 -->
      <rect x="70" y="450" width="160" height="30" fill="rgba(255,205,86,0.3)" rx="5"/>
      <text x="150" y="470" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4层</text>
      <!-- 5层 -->
      <rect x="75" y="400" width="150" height="30" fill="rgba(75,192,192,0.3)" rx="5"/>
      <text x="150" y="420" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5层</text>
      <!-- 6层 -->
      <rect x="80" y="350" width="140" height="30" fill="rgba(54,162,235,0.3)" rx="5"/>
      <text x="150" y="370" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">6层</text>
      <!-- 7层 -->
      <rect x="85" y="300" width="130" height="30" fill="rgba(153,102,255,0.3)" rx="5"/>
      <text x="150" y="320" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">7层</text>
      <!-- 8层 -->
      <rect x="90" y="250" width="120" height="30" fill="rgba(255,159,64,0.3)" rx="5"/>
      <text x="150" y="270" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">8层</text>
      <!-- 9层 -->
      <rect x="95" y="200" width="110" height="30" fill="rgba(255,99,132,0.3)" rx="5"/>
      <text x="150" y="220" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">9层</text>
      <!-- 10层 -->
      <rect x="100" y="150" width="100" height="30" fill="rgba(201,203,207,0.3)" rx="5"/>
      <text x="150" y="170" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">10层</text>
      <!-- J层 -->
      <rect x="105" y="100" width="90" height="30" fill="rgba(255,215,0,0.3)" rx="5"/>
      <text x="150" y="120" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">J层</text>
      <!-- Q层 -->
      <rect x="110" y="50" width="80" height="30" fill="rgba(233,30,99,0.3)" rx="5"/>
      <text x="150" y="70" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Q层</text>
      <!-- K层 -->
      <rect x="115" y="0" width="70" height="30" fill="rgba(156,39,176,0.3)" rx="5"/>
      <text x="150" y="20" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">K层</text>
      <!-- A层（塔顶） -->
      <circle cx="150" cy="-20" r="25" fill="url(#goldGradient)" stroke="#ff8c00" stroke-width="3"/>
      <text x="150" y="-15" text-anchor="middle" fill="#000" font-size="20" font-weight="bold">A</text>
    </g>
    
    <!-- 塔名 -->
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🇫🇷 埃菲尔铁塔</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="12">巴黎，法国</text>
    
    <!-- 卡通角色 - 火箭小鸟 -->
    <g transform="translate(30, 520)">
      <ellipse cx="20" cy="20" rx="15" ry="12" fill="#ff4444"/>
      <circle cx="25" cy="18" r="3" fill="#fff"/>
      <circle cx="26" cy="18" r="1" fill="#000"/>
      <path d="M5 20 L-5 15 L-5 25 Z" fill="#ff8800"/>
      <rect x="-8" y="18" width="8" height="4" fill="#ff0000"/>
    </g>
    
    <!-- 卡通角色 - 孙悟空金箍棒 -->
    <g transform="translate(250, 400)">
      <circle cx="20" cy="15" r="12" fill="#ffcc99"/>
      <ellipse cx="20" cy="10" rx="8" ry="4" fill="#ff4444"/>
      <rect x="25" y="5" width="30" height="4" fill="#ffd700"/>
      <rect x="55" y="3" width="4" height="8" fill="#8b4513"/>
      <circle cx="20" cy="25" r="5" fill="#ffcc99"/>
    </g>
    
    <!-- 卡通角色 - 魔毯猴子 -->
    <g transform="translate(20, 200)">
      <ellipse cx="40" cy="10" rx="25" ry="8" fill="#9c27b0"/>
      <pattern id="carpetPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
        <circle cx="5" cy="5" r="2" fill="#ffd700"/>
      </pattern>
      <ellipse cx="40" cy="10" rx="25" ry="8" fill="url(#carpetPattern)" opacity="0.5"/>
      <circle cx="40" cy="-5" r="10" fill="#ffcc99"/>
      <circle cx="42" cy="-7" r="2" fill="#fff"/>
      <circle cx="43" cy="-7" r="1" fill="#000"/>
    </g>
    
    <!-- 降落伞 -->
    <g transform="translate(220, 150)">
      <path d="M0 0 Q15 -20 30 0" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
      <path d="M30 0 Q45 -20 60 0" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
      <line x1="15" y1="0" x2="15" y2="20" stroke="#333" stroke-width="1"/>
      <line x1="30" y1="0" x2="30" y2="20" stroke="#333" stroke-width="1"/>
      <line x1="45" y1="0" x2="45" y2="20" stroke="#333" stroke-width="1"/>
      <circle cx="30" cy="25" r="8" fill="#4caf50"/>
      <circle cx="32" cy="23" r="2" fill="#fff"/>
      <circle cx="33" cy="23" r="1" fill="#000"/>
    </g>
  </g>
  
  <!-- ==================== 东京塔 ==================== -->
  <g id="tokyo-tower" transform="translate(450, 100)">
    <!-- 塔身 -->
    <path d="M100 600 L110 400 L120 200 L130 100 L135 50 L140 20 L150 0 L160 20 L165 50 L170 100 L180 200 L190 400 L200 600 Z" 
          fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
    
    <!-- 横向结构 -->
    <rect x="105" y="380" width="90" height="10" fill="#fff" opacity="0.8"/>
    <rect x="115" y="180" width="70" height="10" fill="#fff" opacity="0.8"/>
    
    <!-- 13层标记（简化） -->
    <g class="tower-levels">
      <rect x="50" y="550" width="200" height="25" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="567" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">2-5层</text>
      
      <rect x="70" y="350" width="160" height="25" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="367" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">6-9层</text>
      
      <rect x="100" y="150" width="100" height="25" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="167" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">10-A层</text>
    </g>
    
    <!-- 塔顶 -->
    <circle cx="150" cy="-10" r="20" fill="url(#goldGradient)" stroke="#ff8c00" stroke-width="2"/>
    <text x="150" y="-5" text-anchor="middle" fill="#000" font-size="16" font-weight="bold">A</text>
    
    <!-- 塔名 -->
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🇯🇵 东京塔</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="12">东京，日本</text>
    
    <!-- 卡通角色 -->
    <g transform="translate(30, 300)">
      <ellipse cx="20" cy="20" rx="15" ry="12" fill="#4caf50"/>
      <circle cx="25" cy="18" r="3" fill="#fff"/>
      <circle cx="26" cy="18" r="1" fill="#000"/>
      <path d="M5 20 L-5 15 L-5 25 Z" fill="#ff4444"/>
    </g>
  </g>
  
  <!-- ==================== 迪拜塔 ==================== -->
  <g id="burj-khalifa" transform="translate(800, 100)">
    <!-- 塔身 - 尖塔形 -->
    <path d="M150 600 L155 500 L160 400 L162 300 L163 200 L164 150 L165 100 L165 50 L150 0 L135 50 L135 100 L136 150 L137 200 L138 300 L140 400 L145 500 L150 600 Z" 
          fill="#5c6bc0" stroke="#3949ab" stroke-width="2"/>
    
    <!-- 玻璃反光效果 -->
    <path d="M150 600 L152 500 L154 400 L155 300 L156 200 L157 150 L158 100 L158 50 L150 0" 
          stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
    
    <!-- 13层标记 -->
    <g class="tower-levels">
      <rect x="100" y="550" width="100" height="20" fill="rgba(255,255,255,0.15)" rx="3"/>
      <text x="150" y="564" text-anchor="middle" fill="#fff" font-size="10">2层</text>
      
      <rect x="105" y="380" width="90" height="20" fill="rgba(255,255,255,0.15)" rx="3"/>
      <text x="150" y="394" text-anchor="middle" fill="#fff" font-size="10">7层</text>
      
      <rect x="110" y="180" width="80" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="194" text-anchor="middle" fill="#fff" font-size="10">K层</text>
    </g>
    
    <!-- 塔顶 -->
    <polygon points="150,-5 145,-20 155,-20" fill="#ffd700"/>
    <circle cx="150" cy="-15" r="15" fill="url(#goldGradient)" stroke="#ff8c00" stroke-width="2"/>
    <text x="150" y="-10" text-anchor="middle" fill="#000" font-size="14" font-weight="bold">A</text>
    
    <!-- 塔名 -->
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🇦🇪 哈利法塔</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="12">迪拜，阿联酋</text>
    
    <!-- 卡通角色 - 魔毯 -->
    <g transform="translate(30, 200)">
      <ellipse cx="40" cy="10" rx="25" ry="8" fill="#9c27b0"/>
      <pattern id="carpetPattern2" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="1.5" fill="#ffd700"/>
      </pattern>
      <ellipse cx="40" cy="10" rx="25" ry="8" fill="url(#carpetPattern2)" opacity="0.5"/>
      <circle cx="40" cy="-5" r="8" fill="#ffcc99"/>
    </g>
  </g>
</svg>
