<!-- more_towers.svg - 更多名塔卡通UI元素 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 800">
  <defs>
    <linearGradient id="skyGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#3949ab"/>
      <stop offset="100%" style="stop-color:#5c6bc0"/>
    </linearGradient>
    <linearGradient id="goldGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  
  <rect width="2000" height="800" fill="url(#skyGradient2)"/>
  
  <!-- ==================== 东方明珠 (上海) ==================== -->
  <g id="oriental-pearl" transform="translate(50, 100)">
    <!-- 塔身 - 三个球体结构 -->
    <rect x="140" y="500" width="20" height="100" fill="#e53935"/>
    <rect x="120" y="350" width="60" height="150" fill="#e53935"/>
    <circle cx="150" cy="320" r="40" fill="#f44336" stroke="#b71c1c" stroke-width="3"/>
    <rect x="130" y="200" width="40" height="120" fill="#e53935"/>
    <circle cx="150" cy="150" r="25" fill="#f44336" stroke="#b71c1c" stroke-width="3"/>
    <rect x="140" y="50" width="20" height="100" fill="#e53935"/>
    <circle cx="150" cy="30" r="15" fill="url(#goldGradient2)"/>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="550" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="564" text-anchor="middle" fill="#fff" font-size="10">2-5层</text>
      
      <rect x="80" y="300" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="314" text-anchor="middle" fill="#fff" font-size="10">6-10层</text>
      
      <rect x="100" y="120" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="134" text-anchor="middle" fill="#fff" font-size="10">J-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇨🇳 东方明珠</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">上海，中国</text>
    
    <!-- 卡通角色 - 猴子 -->
    <g transform="translate(50, 280)">
      <circle cx="20" cy="15" r="12" fill="#ffcc99"/>
      <ellipse cx="20" cy="10" rx="8" ry="4" fill="#ff4444"/>
      <rect x="25" y="5" width="20" height="3" fill="#ffd700"/>
      <circle cx="20" cy="25" r="5" fill="#ffcc99"/>
    </g>
  </g>
  
  <!-- ==================== 帝国大厦 (纽约) ==================== --
003e
  <g id="empire-state" transform="translate(350, 100)">
    <!-- 塔身 - Art Deco风格 -->
    <rect x="100" y="450" width="100" height="150" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    <rect x="110" y="350" width="80" height="100" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    <rect x="120" y="250" width="60" height="100" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    <rect x="130" y="150" width="40" height="100" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    <rect x="140" y="50" width="20" height="100" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    
    <!-- 顶部天线 -->
    <rect x="148" y="20" width="4" height="30" fill="#ff4444"/>
    <circle cx="150" cy="15" r="8" fill="url(#goldGradient2)"/>
    
    <!-- 窗户细节 -->
    <g fill="#eceff1">
      <rect x="110" y="470" width="5" height="10"/>
      <rect x="125" y="470" width="5" height="10"/>
      <rect x="140" y="470" width="5" height="10"/>
      <rect x="155" y="470" width="5" height="10"/>
      <rect x="170" y="470" width="5" height="10"/>
      <rect x="185" y="470" width="5" height="10"/>
    </g>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="550" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="564" text-anchor="middle" fill="#fff" font-size="10">2-5层</text>
      
      <rect x="80" y="320" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="334" text-anchor="middle" fill="#fff" font-size="10">6-9层</text>
      
      <rect x="100" y="120" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="134" text-anchor="middle" fill="#fff" font-size="10">10-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇺🇸 帝国大厦</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">纽约，美国</text>
    
    <!-- 卡通角色 - 绿猪火箭 -->
    <g transform="translate(50, 400)">
      <ellipse cx="20" cy="20" rx="15" ry="12" fill="#4caf50"/>
      <circle cx="25" cy="18" r="3" fill="#fff"/>
      <circle cx="26" cy="18" r="1" fill="#000"/>
      <path d="M5 20 L-5 15 L-5 25 Z" fill="#ff4444"/>
    </g>
  </g>
  
  <!-- ==================== 大本钟 (伦敦) ==================== -->
  <g id="big-ben" transform="translate(650, 100)">
    <!-- 塔身 - 哥特式建筑 -->
    <rect x="120" y="350" width="60" height="250" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
    <!-- 时钟面 -->
    <circle cx="150" cy="280" r="35" fill="#fff" stroke="#d4af37" stroke-width="5"/>
    <line x1="150" y1="280" x2="150" y2="255" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <line x1="150" y1="280" x2="170" y2="280" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 尖顶 -->
    <polygon points="150,50 120,150 180,150" fill="#8b7355"/>
    <rect x="140" y="30" width="20" height="20" fill="#d4af37"/>
    
    <!-- 装饰细节 -->
    <rect x="115" y="340" width="70" height="10" fill="#b8860b"/>
    <rect x="115" y="600" width="70" height="10" fill="#b8860b"/>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="550" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="564" text-anchor="middle" fill="#fff" font-size="10">2-7层</text>
      
      <rect x="80" y="240" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="254" text-anchor="middle" fill="#fff" font-size="10">8-J层</text>
      
      <rect x="100" y="60" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="74" text-anchor="middle" fill="#fff" font-size="10">Q-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇬🇧 大本钟</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">伦敦，英国</text>
    
    <!-- 卡通角色 - 降落伞 -->
    <g transform="translate(220, 150)">
      <path d="M0 0 Q15 -20 30 0" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
      <path d="M30 0 Q45 -20 60 0" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
      <line x1="15" y1="0" x2="15" y2="20" stroke="#333" stroke-width="1"/>
      <line x1="30" y1="0" x2="30" y2="20" stroke="#333" stroke-width="1"/>
      <line x1="45" y1="0" x2="45" y2="20" stroke="#333" stroke-width="1"/>
      <circle cx="30" cy="25" r="8" fill="#f44336"/>
    </g>
  </g>
  
  <!-- ==================== 比萨斜塔 (意大利) ==================== -->
  <g id="pisa-tower" transform="translate(950, 100)">
    <!-- 塔身 - 倾斜圆柱 -->
    <g transform="rotate(-5, 150, 400)">
      <rect x="100" y="100" width="100" height="500" fill="#f5f5dc" stroke="#d4c4a8" stroke-width="2" rx="5"/>
      
      <!-- 层线 -->
      <line x1="100" y1="150" x2="200" y2="150" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="200" x2="200" y2="200" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="250" x2="200" y2="250" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="300" x2="200" y2="300" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="350" x2="200" y2="350" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="400" x2="200" y2="400" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="450" x2="200" y2="450" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="500" x2="200" y2="500" stroke="#d4c4a8" stroke-width="3"/>
      <line x1="100" y1="550" x2="200" y2="550" stroke="#d4c4a8" stroke-width="3"/>
      
      <!-- 柱子 -->
      <rect x="110" y="150" width="5" height="50" fill="#d4c4a8"/>
      <rect x="135" y="150" width="5" height="50" fill="#d4c4a8"/>
      <rect x="160" y="150" width="5" height="50" fill="#d4c4a8"/>
      <rect x="185" y="150" width="5" height="50" fill="#d4c4a8"/>
    </g>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="600" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="614" text-anchor="middle" fill="#fff" font-size="10">2-5层</text>
      
      <rect x="80" y="400" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="414" text-anchor="middle" fill="#fff" font-size="10">6-10层</text>
      
      <rect x="100" y="150" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="164" text-anchor="middle" fill="#fff" font-size="10">J-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇮🇹 比萨斜塔</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">比萨，意大利</text>
    
    <!-- 卡通角色 - 红鸟 -->
    <g transform="translate(50, 300)">
      <ellipse cx="20" cy="20" rx="15" ry="12" fill="#f44336"/>
      <circle cx="25" cy="18" r="3" fill="#fff"/>
      <circle cx="26" cy="18" r="1" fill="#000"/>
      <path d="M35 20 L45 18 L45 22 Z" fill="#ff9800"/>
    </g>
  </g>
  
  <!-- ==================== 圣家堂 (巴塞罗那) ==================== -->
  <g id="sagrada-familia" transform="translate(1250, 100)">
    <!-- 塔身 - 高迪风格 -->
    <path d="M150 600 L130 400 L140 200 L145 100 L150 0 L155 100 L160 200 L170 400 L150 600 Z" 
          fill="#d7ccc8" stroke="#8d6e63" stroke-width="2"/>
    
    <!-- 装饰性塔尖 -->
    <path d="M120 400 L110 200 L115 100 L120 50" fill="none" stroke="#8d6e63" stroke-width="3"/>
    
    <path d="M180 400 L190 200 L185 100 L180 50" fill="none" stroke="#8d6e63" stroke-width="3"/>
    
    <!-- 装饰 -->
    <circle cx="120" cy="300" r="15" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
    <circle cx="180" cy="300" r="15" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
    
    <circle cx="135" cy="200" r="10" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
    
    <circle cx="165" cy="200" r="10" fill="#fff" stroke="#8d6e63" stroke-width="2"/>
    
    <!-- 顶部十字架 -->
    <rect x="145" y="0" width="10" height="30" fill="#d4af37"/>
    
    <rect x="135" y="10" width="30" height="10" fill="#d4af37"/>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="550" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="564" text-anchor="middle" fill="#fff" font-size="10">2-6层</text>
      
      <rect x="80" y="350" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="364" text-anchor="middle" fill="#fff" font-size="10">7-J层</text>
      
      <rect x="100" y="100" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="114" text-anchor="middle" fill="#fff" font-size="10">Q-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇪🇸 圣家堂</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">巴塞罗那，西班牙</text>
    
    <!-- 卡通角色 - 猴子魔毯 -->
    <g transform="translate(220, 250)">
      <ellipse cx="40" cy="10" rx="25" ry="8" fill="#9c27b0"/>
      <circle cx="40" cy="-5" r="8" fill="#ffcc99"/>
    </g>
  </g>
  
  <!-- ==================== 莫斯科大学塔 (俄罗斯) ==================== -->
  <g id="moscow-university" transform="translate(1550, 100)">
    <!-- 塔身 - 斯大林式建筑 -->
    <rect x="100" y="400" width="100" height="200" fill="#5c6bc0" stroke="#3949ab" stroke-width="2"/>
    
    <rect x="110" y="250" width="80" height="150" fill="#5c6bc0" stroke="#3949ab" stroke-width="2"/>
    
    <rect x="120" y="150" width="60" height="100" fill="#5c6bc0" stroke="#3949ab" stroke-width="2"/>
    
    <rect x="130" y="80" width="40" height="70" fill="#5c6bc0" stroke="#3949ab" stroke-width="2"/>
    
    <rect x="140" y="30" width="20" height="50" fill="#5c6bc0" stroke="#3949ab" stroke-width="2"/>
    
    <!-- 红星 -->
    <polygon points="150,10 155,25 170,25 158,35 163,50 150,40 137,50 142,35 130,25 145,25" 
             fill="#f44336" stroke="#b71c1c" stroke-width="2"/>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="550" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="564" text-anchor="middle" fill="#fff" font-size="10">2-6层</text>
      
      <rect x="80" y="320" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="334" text-anchor="middle" fill="#fff" font-size="10">7-10层</text>
      
      <rect x="100" y="100" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="114" text-anchor="middle" fill="#fff" font-size="10">J-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇷🇺 莫斯科大学</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">莫斯科，俄罗斯</text>
    
    <!-- 卡通角色 - 火箭 -->
    <g transform="translate(50, 350)">
      <ellipse cx="20" cy="20" rx="15" ry="12" fill="#2196f3"/>
      <circle cx="25" cy="18" r="3" fill="#fff"/>
      <circle cx="26" cy="18" r="1" fill="#000"/>
      <path d="M5 20 L-5 15 L-5 25 Z" fill="#ff4444"/>
    </g>
  </g>
  
  <!-- ==================== 新天鹅堡 (德国) ==================== -->
  <g id="neuschwanstein" transform="translate(1800, 100)">
    <!-- 城堡主体 -->
    <rect x="100" y="450" width="100" height="150" fill="#e8d5b5" stroke="#d4c4a8" stroke-width="2"/>
    
    <!-- 塔楼1 -->
    <rect x="80" y="350" width="30" height="100" fill="#e8d5b5" stroke="#d4c4a8" stroke-width="2"/>
    
    <polygon points="95,350 80,320 110,320" fill="#8b4513"/>
    
    <!-- 塔楼2 -->
    <rect x="170" y="380" width="30" height="70" fill="#e8d5b5" stroke="#d4c4a8" stroke-width="2"/>
    
    <polygon points="185,380 170,350 200,350" fill="#8b4513"/>
    
    <!-- 主塔尖 -->
    <polygon points="150,450 120,300 180,300" fill="#5d4037"/>
    
    <!-- 旗帜 -->
    <rect x="148" y="270" width="4" height="30" fill="#8b4513"/>
    
    <rect x="152" y="275" width="30" height="15" fill="#f44336"/>
    
    <!-- 窗户 -->
    <rect x="140" y="480" width="10" height="15" fill="#5d4037" rx="5"/>
    
    <rect x="155" y="480" width="10" height="15" fill="#5d4037" rx="5"/>
    
    <!-- 层标记 -->
    <g opacity="0.8">
      <rect x="50" y="580" width="200" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="594" text-anchor="middle" fill="#fff" font-size="10">2-7层</text>
      
      <rect x="80" y="380" width="140" height="20" fill="rgba(255,255,255,0.2)" rx="3"/>
      <text x="150" y="394" text-anchor="middle" fill="#fff" font-size="10">8-Q层</text>
      
      <rect x="100" y="280" width="100" height="20" fill="rgba(255,215,0,0.3)" rx="3"/>
      <text x="150" y="294" text-anchor="middle" fill="#fff" font-size="10">K-A层</text>
    </g>
    
    <text x="150" y="650" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">🇩🇪 新天鹅堡</text>
    <text x="150" y="670" text-anchor="middle" fill="#ffd700" font-size="11">巴伐利亚，德国</text>
    
    <!-- 卡通角色 -->
    <g transform="translate(50, 500)">
      <circle cx="20" cy="20" r="12" fill="#ffcc99"/>
      <circle cx="23" cy="17" r="3" fill="#fff"/>
      <circle cx="24" cy="17" r="1" fill="#000"/>
    </g>
  </g>
</svg>
