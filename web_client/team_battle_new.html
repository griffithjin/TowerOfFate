<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>命运塔·首登者 - 团队赛</title>
    <script src="pixel_tower_system.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --team-primary: #3498db;
            --enemy-primary: #e74c3c;
            --accent: #ffd700;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            padding: env(safe-area-inset-top) 6px env(safe-area-inset-bottom);
        }
        
        /* 一屏容器 */
        .game-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
        }
        
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(255,215,0,0.1);
            border-bottom: 2px solid var(--accent);
            flex-shrink: 0;
        }
        
        .header-title {
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .round-info {
            font-size: 11px;
            color: #aaa;
        }
        
        /* 主游戏区 */
        .main-area {
            flex: 1;
            display: flex;
            gap: 6px;
            padding: 6px;
            min-height: 0;
        }
        
        /* 左侧：我方队伍 */
        .team-panel {
            flex: 0 0 22%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .team-title {
            font-size: 10px;
            color: var(--team-primary);
            text-align: center;
            font-weight: bold;
        }
        
        .player-slot {
            background: rgba(52,152,219,0.15);
            border: 1px solid var(--team-primary);
            border-radius: 8px;
            padding: 4px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        
        .player-slot.me {
            background: rgba(52,152,219,0.3);
            box-shadow: 0 0 10px rgba(52,152,219,0.3);
        }
        
        .player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--team-primary), #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin: 0 auto 2px;
        }
        
        .player-name {
            font-size: 9px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-status {
            font-size: 8px;
            color: var(--accent);
            margin-top: 2px;
        }
        
        /* 中间：塔 + 对战区 */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        
        /* 对战状态 */
        .battle-status {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 6px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .vs-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .vs-team {
            text-align: center;
        }
        
        .vs-score {
            font-size: 20px;
            font-weight: bold;
        }
        
        .vs-score.team { color: var(--team-primary); }
        .vs-score.enemy { color: var(--enemy-primary); }
        
        .vs-label {
            font-size: 9px;
            color: #aaa;
        }
        
        .vs-divider {
            font-size: 14px;
            color: var(--accent);
            font-weight: bold;
        }
        
        /* 倒计时 */
        .countdown-bar {
            background: rgba(255,71,71,0.2);
            border-radius: 20px;
            height: 6px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .countdown-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b6b);
            border-radius: 20px;
            transition: width 1s linear;
        }
        
        /* 塔区域 */
        .tower-section {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .tower-name {
            font-size: 11px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 4px;
        }
        
        .tower-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            padding: 0 20px;
        }
        
        .tower {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        
        .tower-level {
            height: 10px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            position: relative;
        }
        
        /* 塔上的玩家头像 */
        .tower-avatar {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            animation: avatarFloat 2s infinite;
        }
        
        .tower-avatar.team {
            right: -20px;
            background: linear-gradient(135deg, var(--team-primary), #2980b9);
        }
        
        .tower-avatar.enemy {
            left: -20px;
            background: linear-gradient(135deg, var(--enemy-primary), #c0392b);
        }
        
        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        
        /* 嘲讽气泡 */
        .taunt-bubble {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            white-space: nowrap;
            z-index: 20;
            animation: bubbleShow 3s forwards;
        }
        
        .taunt-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: #fff transparent transparent;
        }
        
        @keyframes bubbleShow {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* 对战记录 */
        .battle-log {
            flex: 0 0 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .log-title {
            font-size: 9px;
            color: #aaa;
            margin-bottom: 4px;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            font-size: 9px;
            line-height: 1.3;
        }
        
        /* 右侧：敌方队伍 */
        .enemy-panel {
            flex: 0 0 22%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .enemy-title {
            font-size: 10px;
            color: var(--enemy-primary);
            text-align: center;
            font-weight: bold;
        }
        
        .enemy-slot {
            background: rgba(231,76,60,0.15);
            border: 1px solid var(--enemy-primary);
            border-radius: 8px;
            padding: 4px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .enemy-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--enemy-primary), #c0392b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin: 0 auto 2px;
        }
        
        /* 底部：我的手牌 + 操作 */
        .bottom-panel {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px 10px 0 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .my-hand-title {
            font-size: 10px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }
        
        .hand-cards {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .hand-card {
            flex-shrink: 0;
            width: 40px;
            height: 56px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .hand-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(255,215,0,0.5);
        }
        
        .hand-card .suit {
            font-size: 16px;
        }
        
        .hand-card .rank {
            font-size: 11px;
            font-weight: bold;
            color: #000;
        }
        
        /* 操作按钮 */
        .action-bar {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-taunt {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            color: #000;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 天命牌 */
        .destiny-cards {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        
        .destiny-card {
            width: 36px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }
        
        .destiny-card .icon {
            font-size: 14px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: env(safe-area-inset-top, 6px);
            left: 10px;
            color: #aaa;
            text-decoration: none;
            font-size: 12px;
            z-index: 100;
        }
        
        /* iPhone SE优化 */
        @media (max-width: 375px) {
            .player-avatar, .enemy-avatar {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .hand-card {
                width: 36px;
                height: 50px;
            }
            .tower-level {
                height: 9px;
                font-size: 6px;
            }
        }
        
        /* 响应式优化 */
        @media (min-height: 700px) {
            .tower-level {
                height: 12px;
                font-size: 8px;
            }
            .player-avatar, .enemy-avatar {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <a href="new_index.html" class="back-btn">← 返回</a>
    
    <div class="game-container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-title">⚔️ 团队赛 3v3</div>
            <div class="round-info">第 <span id="roundNum">1</span> 回合</div>
        </div>
        
        <!-- 主游戏区 -->
        <div class="main-area">
            <!-- 左侧：我方队伍 -->
            <div class="team-panel">
                <div class="team-title">🔵 我方队伍</div>
                <div class="player-slot">
                    <div class="player-avatar">😎</div>
                    <div class="player-name">队友A</div>
                    <div class="player-status">第5层</div>
                </div>
                <div class="player-slot me">
                    <div class="player-avatar">😊</div>
                    <div class="player-name">我</div>
                    <div class="player-status">第3层</div>
                </div>
                <div class="player-slot">
                    <div class="player-avatar">🤠</div>
                    <div class="player-name">队友B</div>
                    <div class="player-status">第4层</div>
                </div>
            </div>
            
            <!-- 中间：对战区 + 塔 -->
            <div class="center-panel">
                <!-- 对战状态 -->
                <div class="battle-status">
                    <div class="vs-display">
                        <div class="vs-team">
                            <div class="vs-score team" id="teamScore">12</div>
                            <div class="vs-label">我方进度</div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="vs-team">
                            <div class="vs-score enemy" id="enemyScore">8</div>
                            <div class="vs-label">敌方进度</div>
                        </div>
                    </div>
                    <div class="countdown-bar">
                        <div class="countdown-fill" id="countdownFill" style="width: 80%;"></div>
                    </div>
                </div>
                
                <!-- 塔区域 -->
                <div class="tower-section">
                    <div class="tower-name">🏰 东京塔 🇯🇵</div>
                    <div class="tower-container">
                        <div class="tower" id="tower">
                            <!-- 塔层动态生成 -->
                        </div>
                    </div>
                </div>
                
                <!-- 对战记录 -->
                <div class="battle-log">
                    <div class="log-title">📜 对战记录</div>
                    <div class="log-content" id="battleLog">
                        <div>🎴 队友A出♥A，守卫出♠K，✅晋级</div>
                        <div>🎴 敌方1出♦Q，守卫出♣Q，✅晋级</div>
                        <div>💬 敌方2:"你们太慢了！"</div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：敌方队伍 -->
            <div class="enemy-panel">
                <div class="enemy-title">🔴 敌方队伍</div>
                <div class="enemy-slot">
                    <div class="enemy-avatar">😈</div>
                    <div class="player-name">敌方1</div>
                    <div class="player-status">第6层</div>
                </div>
                <div class="enemy-slot">
                    <div class="enemy-avatar">👿</div>
                    <div class="player-name">敌方2</div>
                    <div class="player-status">第4层</div>
                </div>
                <div class="enemy-slot">
                    <div class="enemy-avatar">🤡</div>
                    <div class="player-name">敌方3</div>
                    <div class="player-status">第2层</div>
                </div>
            </div>
        </div>
        
        <!-- 底部：我的手牌 + 操作 -->
        <div class="bottom-panel">
            <!-- 天命牌 -->
            <div class="destiny-cards">
                <div class="destiny-card" onclick="useDestiny(0)">
                    <div class="icon">⚡</div>
                    <div>突击</div>
                </div>
                <div class="destiny-card" onclick="useDestiny(1)">
                    <div class="icon">🔄</div>
                    <div>换牌</div>
                </div>
                <div class="destiny-card" onclick="useDestiny(2)">
                    <div class="icon">👁️</div>
                    <div>透视</div>
                </div>
            </div>
            
            <!-- 手牌 -->
            <div class="my-hand-title">
                <span>🎴 我的手牌</span>
                <span>选一张出牌</span>
            </div>
            
            <div class="hand-cards" id="handCards">
                <div class="hand-card selected">
                    <div class="suit" style="color: #d00;">♥</div>
                    <div class="rank">A</div>
                </div>
                <div class="hand-card">
                    <div class="suit" style="color: #d00;">♦</div>
                    <div class="rank">K</div>
                </div>
                <div class="hand-card">
                    <div class="suit" style="color: #000;">♠</div>
                    <div class="rank">Q</div>
                </div>
                <div class="hand-card">
                    <div class="suit" style="color: #000;">♣</div>
                    <div class="rank">J</div>
                </div>
                <div class="hand-card">
                    <div class="suit" style="color: #d00;">♥</div>
                    <div class="rank">10</div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="action-bar">
                <button class="btn btn-taunt" onclick="sendTaunt()">💬 嘲讽</button>
                <button class="btn btn-confirm" onclick="confirmPlay()">✅ 确认出牌</button>
            </div>
        </div>
    </div>
    
    <script>
        // 初始化塔
        function initTower() {
            const tower = document.getElementById('tower');
            let html = '';
            
            // 从下到上渲染13层
            for (let i = 1; i <= 13; i++) {
                const levelName = ['2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟','J','Q','K','A'][i-1];
                const hasTeam = i === 3;
                const hasEnemy = i === 6;
                
                html += `
                    <div class="tower-level" style="background: ${hasTeam ? 'rgba(52,152,219,0.6)' : hasEnemy ? 'rgba(231,76,60,0.6)' : 'rgba(255,255,255,0.1)'};">
                        ${levelName}
                        ${hasTeam ? '<div class="tower-avatar team">😊</div>' : ''}
                        ${hasEnemy ? '<div class="tower-avatar enemy">😈</div>' : ''}
                    </div>
                `;
            }
            
            tower.innerHTML = html;
        }
        
        // 发送嘲讽
        function sendTaunt() {
            const taunts = [
                '你们追不上我们！',
                ' teamwork makes the dream work!',
                '守卫是我们的！',
                '认输吧！'
            ];
            const taunt = taunts[Math.floor(Math.random() * taunts.length)];
            
            // 语音播放
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(taunt);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.2;
                speechSynthesis.speak(utterance);
            }
            
            // 显示气泡
            const myAvatar = document.querySelector('.player-slot.me .player-avatar');
            const bubble = document.createElement('div');
            bubble.className = 'taunt-bubble';
            bubble.textContent = taunt;
            myAvatar.appendChild(bubble);
            
            setTimeout(() => bubble.remove(), 3000);
        }
        
        // 使用天命牌
        function useDestiny(index) {
            alert('使用天命牌: ' + index);
        }
        
        // 确认出牌
        function confirmPlay() {
            alert('出牌成功！');
        }
        
        // 初始化
        initTower();
    </script>
</body>
</html>
